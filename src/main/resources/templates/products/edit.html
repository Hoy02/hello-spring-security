<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .card { border-radius: 12px; }
        .btn-submit { background-color: #e94560; color: white; }
        .btn-submit:hover { background-color: #d33851; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 700px;">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">상품 정보 수정</h4>
        <small class="text-muted">관리자 권한으로 상품 정보를 수정합니다. (ID: <span th:text="${productId}"></span>)</small>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">상품명 <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" id="name"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                           placeholder="상품명을 입력하세요" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                        상품명은 필수입니다.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label fw-semibold">가격 (원) <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{price}" id="price"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                           placeholder="가격을 입력하세요" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">
                        올바른 가격을 입력하세요.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label fw-semibold">재고 수량 <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{stock}" id="stock"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid' : ''"
                           placeholder="재고 수량을 입력하세요" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">
                        올바른 재고 수량을 입력하세요.
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label fw-semibold">상품 설명</label>
                    <textarea th:field="*{description}" id="description"
                              class="form-control" rows="4"
                              placeholder="상품에 대한 상세 설명을 입력하세요 (선택사항)"></textarea>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/products}" class="btn btn-outline-secondary px-4">취소</a>
                    <button type="submit" class="btn btn-submit px-4 fw-semibold">수정 완료</button>
                </div>

            </form>

        </div>
    </div>
</div>

<footer class="text-center mt-5">
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171343 | 성명: 김호영'}"></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
